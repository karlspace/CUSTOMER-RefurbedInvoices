services:
  refurbed-invoices:
    build: .
    restart: unless-stopped
    container_name: ${STACK_NAME:-refurbed-invoices}
    environment:
      - SHOP=${SHOP}
      - SHOPIFY_TOKEN=${SHOPIFY_TOKEN}
      - REFURBED_TOKEN=${REFURBED_TOKEN}
      - IMAP_SERVER=${IMAP_SERVER}
      - IMAP_USERNAME=${IMAP_USERNAME}
      - IMAP_PASSWORD=${IMAP_PASSWORD}
      - SCHEDULE_INTERVAL_SECONDS=${SCHEDULE_INTERVAL_SECONDS:-3600}
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f refurbed-invoices.php >/dev/null || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
